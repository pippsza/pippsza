name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: pippsza
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=facc15&color_dots=#0a0a0a,#1a1a2e,#2d2d44,#facc1580,#facc15

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
